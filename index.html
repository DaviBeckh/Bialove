<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>4Bia</title>

<style>
body {
  margin: 0;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  overflow: hidden;
  /* Melhora o toque no mobile */
  -webkit-tap-highlight-color: transparent; 
}

/* Envelope */
.envelope {
  width: 90%; /* Ajuste para ocupar a largura da tela */
  max-width: 300px; /* Limite de tamanho */
  height: 200px;
  background: #ff6b81;
  position: relative;
  cursor: pointer;
  transition: transform 0.5s;
}

/* Tampa */
.flap {
  width: 0;
  height: 0;
  border-left: 150px solid transparent; /* Ajustado proporcionalmente */
  border-right: 150px solid transparent;
  border-top: 100px solid #ff4757;
  position: absolute;
  top: 0;
  left: -25px; /* Centralizando a aba no envelope */
  transform-origin: top;
  transition: transform 0.6s;
}

/* Carta */
.letter {
  width: 90%;
  max-width: 260px;
  height: 160px;
  background: white;
  position: absolute;
  top: 10px;
  left: 5%;
  border-radius: 8px;
  padding: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  transform: translateY(100px);
  opacity: 0;
  transition: all 0.6s;
  font-size: 14px; /* Aumentado levemente para leitura fácil */
  text-align: center;
  overflow-y: auto; /* Caso o texto seja longo, permite rolar */
}

/* Botão */
#btn {
  display: block;
  margin: 10px auto;
  padding: 12px 20px; /* Botão maior para facilitar o clique com o dedo */
  border: none;
  background: #ff4757;
  color: white;
  border-radius: 5px;
  cursor: pointer;
  font-size: 16px;
  touch-action: manipulation;
}

/* Animação */
.open .flap {
  transform: rotateX(180deg);
}

.open .letter {
  transform: translateY(-80px);
  opacity: 1;
}

/* Corações */
.heart {
  position: absolute;
  animation: float 4s linear infinite;
  pointer-events: none;
}

@keyframes float {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-100vh); opacity: 0; }
}
</style>
</head>

<body>

<audio id="music" src="musica.mp3"></audio>

<div class="envelope" onclick="openLetter()">
  <div class="flap"></div>

  <div class="letter">
    <p id="text"></p>
    <button id="btn" onclick="responder(event)">Responder</button>
  </div>
</div>

<script>
let heartInterval = null;
let opened = false;

const mensagem = "Bia, desde que você entrou na minha vida, tudo ficou mais leve, mais bonito e mais cheio de sentido. Você é aquele detalhe que transforma um dia comum em algo especial. Eu só queria que você soubesse que, em cada sorriso seu, eu encontro um motivo a mais pra te amar. 💖";

let i = 0;

function escreverTexto() {
  const elemento = document.getElementById("text");
  if (i < mensagem.length) {
    elemento.innerHTML += mensagem.charAt(i);
    i++;
    setTimeout(escreverTexto, 40);
  }
}

function openLetter() {
  if (opened) return;
  
  const env = document.querySelector(".envelope");
  env.classList.add("open");
  opened = true;

  // Tenta tocar música (Mobile exige interação do usuário)
  const audio = document.getElementById("music");
  audio.play().catch(e => console.log("Áudio bloqueado"));
  
  createHearts();
  escreverTexto();
}

function responder(event) {
  event.stopPropagation();
  alert("Não dá pra responder por aqui kkkkkkk");
}

function createHearts() {
  if (heartInterval) return;

  heartInterval = setInterval(() => {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 90 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 4000);
  }, 300);
}
</script>

</body>
</html>
