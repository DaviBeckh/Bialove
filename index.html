<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>4Bia</title>

<style>
body {
  margin: 0;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* Envelope */
.envelope {
  width: 250px;
  height: 180px;
  background: #ff6b81;
  position: relative;
  cursor: pointer;
  transition: transform 0.5s;
}

.envelope:hover {
  transform: scale(1.05);
}

/* Tampa */
.flap {
  width: 0;
  height: 0;
  border-left: 125px solid transparent;
  border-right: 125px solid transparent;
  border-top: 90px solid #ff4757;
  position: absolute;
  top: 2px;
  left: 0;
  transform-origin: top;
  transition: transform 0.6s;
}

/* Carta */
.letter {
  width: 220px;
  height: 140px;
  background: white;
  position: absolute;
  top: 20px;
  left: 15px;
  border-radius: 8px;
  padding: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  transform: translateY(100px);
  opacity: 0;
  transition: all 0.6s;
  font-size: 13px;
  text-align: center;
  overflow: hidden;
}

/* Texto */
#text {
  white-space: pre-line;
}

/* Botão */
#btn {
  position: absolute;
  bottom: -40px;
  left: 50%;
  transform: translateX(-50%);
  padding: 8px 12px;
  border: none;
  background: #ff4757;
  color: white;
  border-radius: 5px;
  cursor: pointer;
  opacity: 0;
  transition: 0.5s;
  z-index: 10;
}

/* Animação */
.open .flap {
  transform: rotateX(180deg);
}

.open .letter {
  transform: translateY(-80px);
  opacity: 1;
}

.open #btn {
  opacity: 1;
  bottom: -60px;
}

/* Corações */
.heart {
  position: absolute;
  animation: float 4s linear infinite;
  pointer-events: none; /* Para não atrapalhar o clique */
}

@keyframes float {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-600px); opacity: 0; }
}
</style>
</head>

<body>

<audio id="music" src="musica.mp3"></audio>

<div class="envelope" onclick="openLetter()">
  <div class="flap"></div>

  <div class="letter">
    <p id="text"></p>
    <button id="btn" onclick="responder(event)">Responder</button>
  </div>
</div>

<script>
let heartInterval = null;
let opened = false;

// Corrigido: adicionada a aspa inicial aqui
const mensagem = "Bia, desde que você entrou na minha vida, tudo ficou mais leve, mais bonito e mais cheio de sentido. Você é aquele detalhe que transforma um dia comum em algo especial. Eu só queria que você soubesse que, em cada sorriso seu, eu encontro um motivo a mais pra te amar. 💖";

let i = 0;

function escreverTexto() {
  const elemento = document.getElementById("text");
  if (i < mensagem.length) {
    elemento.innerHTML += mensagem.charAt(i);
    i++;
    setTimeout(escreverTexto, 40);
  }
}

function openLetter() {
  if (opened) return; // Evita abrir várias vezes
  
  const env = document.querySelector(".envelope");
  env.classList.add("open");
  opened = true;

  // Tenta tocar a música (alguns navegadores bloqueiam autoplay sem interação)
  document.getElementById("music").play().catch(e => console.log("Áudio bloqueado pelo navegador"));
  
  createHearts();
  escreverTexto();
}

function responder(event) {
  event.stopPropagation(); // Impede que o clique no botão abra o envelope de novo
  alert("Não dá pra responder por aqui kkkkkkk");
}

function createHearts() {
  if (heartInterval) return;

  heartInterval = setInterval(() => {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 90 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 4000);
  }, 300);
}
</script>

</body>
</html>
